<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: transparent; /* Matches Notion background */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #37352f; /* Standard Notion text color */
        }
        #date-container {
            font-size: 24px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="date-container"></div>

    <script>
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date-container').innerText = now.toLocaleDateString(undefined, options);
        }
        updateDate();
    </script>
</body>
</html>
